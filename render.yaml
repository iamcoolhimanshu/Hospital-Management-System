services:
  - type: web
    name: hospital-management-system
    env: java
    rootDir: hms/hms

    buildCommand: ./mvnw clean package -DskipTests

    startCommand: java -jar target/*.jar

    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
